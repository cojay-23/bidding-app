<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BidScope 标书分析工作台</title>
  <style>
    :root {
      --bg: #f8fbff;
      --panel: #ffffff;
      --panel-soft: #f6fafe;
      --text: #202124;
      --muted: #5f6368;
      --line: #dfe5f2;
      --blue: #1a73e8;
      --blue-2: #1558b0;
      --blue-soft: #e8f0fe;
      --danger: #d93025;
      --danger-soft: #fce8e6;
      --ok: #188038;
      --ok-soft: #e6f4ea;
      --warn: #b06000;
      --warn-soft: #fef7e0;
      --focus: rgba(26, 115, 232, .22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      letter-spacing: 0;
    }
    button, input, a { font: inherit; }
    button, .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 20px;
      padding: 0 18px;
      color: #fff;
      background: var(--blue);
      font-weight: 650;
      text-decoration: none;
      cursor: pointer;
      transition: background .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    button:hover, .button:hover { background: var(--blue-2); box-shadow: 0 1px 2px rgba(60,64,67,.18); }
    button:focus-visible, .button:focus-visible, input:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }
    button.secondary, .button.secondary {
      color: var(--blue);
      background: #fff;
      border-color: #c7d2e5;
    }
    button.secondary:hover, .button.secondary:hover { background: var(--blue-soft); }
    button.danger {
      color: var(--danger);
      background: #fff;
      border-color: #f1c7c2;
    }
    button.danger:hover { background: var(--danger-soft); }
    button.icon {
      width: 34px;
      min-height: 34px;
      border-radius: 999px;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border-color: transparent;
    }
    button.icon:hover { color: var(--danger); background: var(--danger-soft); box-shadow: none; }
    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: #fff;
      padding: 20px;
      overflow: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      color: #fff;
      background: var(--blue);
      font-weight: 800;
    }
    .brand strong { display: block; font-size: 16px; }
    .brand span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .side-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 18px 0 10px;
    }
    .side-head h2 { margin: 0; font-size: 14px; color: var(--muted); font-weight: 750; }
    .project-list { display: flex; flex-direction: column; gap: 10px; }
    .project-card {
      display: block;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      box-shadow: 0 1px 2px rgba(60,64,67,.05);
    }
    .project-card.active {
      border-color: var(--blue);
      background: #f8fbff;
      box-shadow: 0 0 0 2px rgba(26,115,232,.10);
    }
    .project-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .project-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-weight: 750;
      line-height: 1.35;
    }
    .project-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .project-meta span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      background: #eef2f7;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }
    .status.done { background: var(--ok-soft); color: var(--ok); }
    .status.running { background: var(--warn-soft); color: var(--warn); }
    .status.failed { background: var(--danger-soft); color: var(--danger); }
    .main {
      min-width: 0;
      padding: 24px 28px 40px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0;
      font-weight: 760;
    }
    .topbar p { margin: 0; color: var(--muted); }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      place-items: center;
      padding: 24px;
      background: rgba(32,33,36,.42);
    }
    .modal-backdrop.open { display: grid; }
    .create-panel {
      width: min(520px, 100%);
      border: 1px solid #c7d2e5;
      border-radius: 16px;
      padding: 20px;
      background: #fff;
      box-shadow: 0 18px 52px rgba(60,64,67,.28);
    }
    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .modal-head h2 { margin: 0 0 4px; }
    .modal-head p { margin: 0; color: var(--muted); font-size: 13px; }
    .create-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    input[type="text"], input[type="file"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid #c7d2e5;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(60,64,67,.06);
    }
    .panel + .panel { margin-top: 18px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    h2 { margin: 0; font-size: 18px; letter-spacing: 0; }
    p { line-height: 1.6; }
    .muted { color: var(--muted); }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .summary-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-soft);
    }
    .summary-item span { display: block; color: var(--muted); font-size: 13px; }
    .summary-item strong {
      display: block;
      margin-top: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .metric {
      min-height: 108px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-soft);
    }
    .metric span { display: block; color: var(--muted); font-size: 13px; }
    .metric strong { display: block; margin-top: 9px; font-size: 28px; line-height: 1; }
    .metric small { display: block; margin-top: 9px; color: var(--muted); line-height: 1.4; }
    .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .message { min-height: 22px; margin: 10px 0 0; color: var(--muted); font-size: 13px; }
    .divider { height: 1px; margin: 16px 0; background: var(--line); }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }
    th { color: var(--muted); background: #f8fbff; font-size: 13px; }
    .file-toolbar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }
    .file-upload-zone {
      position: relative;
      border: 2px dashed var(--line);
      border-radius: 14px;
      padding: 32px 20px;
      text-align: center;
      background: linear-gradient(135deg, #fafbff 0%, #f5f8ff 100%);
      cursor: pointer;
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
    }
    .file-upload-zone:hover,
    .file-upload-zone.drag-over {
      border-color: var(--blue);
      background: linear-gradient(135deg, #f0f5ff 0%, #eaf0fe 100%);
      box-shadow: 0 4px 16px rgba(26,115,232,.10);
    }
    .file-upload-zone.has-files { border-style: solid; border-color: #b8d1ff; background: #fff; }
    .upload-icon {
      width: 52px; height: 52px; margin: 0 auto 14px;
      display: grid; place-items: center;
      border-radius: 14px; background: var(--blue-soft); color: var(--blue);
      font-size: 24px; font-weight: 700; line-height: 1;
    }
    .upload-title { margin-bottom: 6px; font-size: 15px; font-weight: 650; color: var(--text); }
    .upload-hint { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .upload-types { display: inline-flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .upload-types span {
      padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600;
      background: #eef2f7; color: var(--muted);
    }
    .file-input-hidden { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-actions { display: flex; gap: 10px; justify-content: flex-start; margin-top: 18px; }
    .file-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .file-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .file-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      display: grid; place-items: center;
      border-radius: 9px; position: relative;
      font-size: 9px; font-weight: 700; letter-spacing: .2px;
    }
    .file-icon svg { width: 100%; height: 100%; }
    .file-icon .ext-tag {
      position: absolute; bottom: -3px; right: -3px;
      background: #fff; border: 1px solid var(--line);
      border-radius: 4px; padding: 1px 4px; font-size: 9px;
      font-weight: 700; color: var(--text);
    }
    .file-icon-docx { background: #e8f0fe; color: #1a56c4; }
    .file-icon-pdf { background: #fce8e6; color: #c5221f; }
    .file-icon-txt { background: #e6f4ea; color: #137333; }
    .file-icon-md { background: #fef7e0; color: #b06000; }
    .file-icon-default { background: #eef2f7; color: #5f6368; }
    .file-card strong {
      display: block;
      overflow-wrap: anywhere;
    }
    .file-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .empty {
      display: grid;
      place-items: center;
      min-height: 360px;
      border: 1px dashed #c7d2e5;
      border-radius: 14px;
      background: #fff;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }
    .actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .actions .button, .actions button { width: 100%; }
    .side-note {
      padding: 14px;
      border-radius: 12px;
      background: var(--blue-soft);
      color: #174ea6;
      line-height: 1.65;
      font-size: 14px;
    }
    @media (max-width: 1120px) {
      .workspace { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .main { padding: 16px; }
      .topbar { flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .file-toolbar { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .metric-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr; }
      h1 { font-size: 23px; }
      .project-meta { grid-template-columns: 1fr; }
      .file-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">B</div>
        <div>
          <strong>BidScope</strong>
          <span>标书分析工作台</span>
        </div>
      </div>
      <div class="side-head">
        <h2>项目</h2>
        <button class="secondary" id="sideCreateBtn">新建</button>
      </div>
      <div class="project-list" id="projectList"></div>
    </aside>

    <main class="main" id="workspace">
      <div class="topbar">
        <div>
          <h1>标书分析工作台</h1>
          <p>上传招标文件和方案材料，生成完整分析报告与结果包。</p>
        </div>
        <div class="top-actions">
          <button id="createToggle">新建项目</button>
          <button class="secondary" id="refreshBtn">刷新</button>
          <button class="secondary" id="logoutBtn" style="color:#d93025;">退出登录</button>
        </div>
      </div>

      <div class="workspace">
        <section class="panel">
          <div id="detail" class="empty">请选择左侧项目，或点击顶部“新建项目”。</div>
        </section>

        <aside>
          <section class="panel" id="reports">
            <div class="panel-head">
              <h2>文件与报告</h2>
              <span class="status" id="currentStatus">未选择</span>
            </div>
            <div class="actions" id="artifactActions">
              <button class="secondary" disabled>请选择已完成项目</button>
            </div>
            <div class="divider"></div>
            <p class="side-note">报告包含项目速览、时间节点、废标条款、评分标准、得分测算、资质门槛、价格限制、材料清单、装订要求、投标框架和自检清单。</p>
          </section>
        </aside>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="createModal" aria-hidden="true">
    <section class="create-panel" role="dialog" aria-modal="true" aria-labelledby="createTitle">
      <div class="modal-head">
        <div>
          <h2 id="createTitle">新建项目</h2>
          <p>创建一个新的标书分析任务，随后上传招标文件和方案材料。</p>
        </div>
        <button type="button" class="secondary" id="createClose">关闭</button>
      </div>
      <form id="createForm" class="create-grid">
        <div>
          <label for="projectName">项目名称</label>
          <input id="projectName" type="text" placeholder="例如：供应链安全检测平台项目">
        </div>
        <div class="row" style="justify-content:flex-end;">
          <button type="button" class="secondary" id="createCancel">取消</button>
          <button>创建</button>
        </div>
      </form>
      <p class="message" id="createMsg"></p>
    </section>
  </div>

  <div class="modal-backdrop" id="historyModal" aria-hidden="true">
    <section class="create-panel" role="dialog" aria-modal="true" aria-labelledby="historyTitle" style="width:min(640px,100%);max-height:80vh;overflow:auto;">
      <div class="modal-head">
        <div>
          <h2 id="historyTitle">历史报告</h2>
          <p>选择要查看或下载的检测报告版本。</p>
        </div>
        <button type="button" class="secondary" id="historyClose">关闭</button>
      </div>
      <div id="historyList" style="display:grid;gap:10px;">
        <p class="muted">加载中...</p>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="analyzeModal" aria-hidden="true">
    <section class="create-panel" role="dialog" aria-modal="true" aria-labelledby="analyzeTitle">
      <div class="modal-head">
        <div>
          <h2 id="analyzeTitle">选择分析类型</h2>
          <p>请选择适合当前项目的分析内核。</p>
        </div>
        <button type="button" class="secondary" id="analyzeClose">关闭</button>
      </div>
      <div class="create-grid">
        <button type="button" class="secondary" id="btnGeneralAnalyze">通用分析（快速）</button>
        <button type="button" id="btnAdvancedAnalyze">高级分析（大模型深度分析）</button>
      </div>
      <p class="message" id="analyzeMsg"></p>
    </section>
  </div>

  <script>
    const api = {
      projects: "/api/projects",
      project: id => `/api/projects/${id}`,
      files: id => `/api/projects/${id}/files`,
      analyze: id => `/api/projects/${id}/analyze`,
      report: id => `/api/projects/${id}/report`,
      reports: id => `/api/projects/${id}/reports`,
      reportById: (id, rid) => `/api/projects/${id}/reports/${rid}`,
      download: id => `/api/projects/${id}/download`,
    };
    let projects = [];
    let selectedId = null;
    let polling = null;
    let csrfToken = null;

    // 从 Cookie 读取 CSRF token
    function getCsrfTokenFromCookie() {
      const match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
      return match ? decodeURIComponent(match[1]) : null;
    }

    // 确保有 CSRF token（首次加载时从服务端获取）
    async function ensureCsrfToken() {
      csrfToken = getCsrfTokenFromCookie();
      if (!csrfToken) {
        try {
          const res = await fetch("/api/csrf-token");
          const data = await res.json();
          csrfToken = data.csrf_token || getCsrfTokenFromCookie();
        } catch (e) {
          console.warn("无法获取 CSRF token");
        }
      }
      return csrfToken;
    }

    // 安全的 fetch 封装：非安全方法自动添加 CSRF token
    async function safeFetch(url, options = {}) {
      const method = (options.method || "GET").toUpperCase();
      if (!["GET", "HEAD", "OPTIONS"].includes(method)) {
        await ensureCsrfToken();
        options.headers = options.headers || {};
        if (csrfToken) {
          if (options.headers instanceof Headers) {
            options.headers.set("X-CSRF-Token", csrfToken);
          } else {
            options.headers["X-CSRF-Token"] = csrfToken;
          }
        }
      }
      return fetch(url, options);
    }

    function statusLabel(status) {
      const map = { draft: "待上传", running: "分析中", done: "已完成", failed: "失败" };
      return map[status] || status || "未选择";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[c]);
    }

    function formatTime(value) {
      if (!value) return "无更新时间";
      return value.replace("T", " ").slice(0, 16);
    }

    function setMessage(id, text) {
      document.getElementById(id).textContent = text || "";
    }

    function openCreatePanel() {
      const modal = document.getElementById("createModal");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      document.getElementById("projectName").focus();
    }

    function closeCreatePanel() {
      const modal = document.getElementById("createModal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      setMessage("createMsg", "");
    }

    async function loadProjects(keepSelection = true) {
      const res = await safeFetch(api.projects);
      projects = await res.json();
      if (!keepSelection || !projects.some(p => p.id === selectedId)) {
        selectedId = projects.find(p => p.status === "done")?.id || projects[0]?.id || null;
      }
      renderProjects();
      renderDetail();
    }

    function renderProjects() {
      const box = document.getElementById("projectList");
      if (!projects.length) {
        box.innerHTML = '<p class="muted">暂无项目</p>';
        return;
      }
      box.innerHTML = projects.map(project => `
        <button class="project-card ${project.id === selectedId ? "active" : ""}" data-id="${project.id}">
          <div class="project-row">
            <span class="project-name">${escapeHtml(project.name)}</span>
            <span class="status ${project.status}">${statusLabel(project.status)}</span>
          </div>
          <div class="project-meta">
            <span>${project.files?.length || 0} 个文件</span>
            <span>${project.summary?.risk_items?.length || 0} 项风险</span>
            <span>ID ${project.id}</span>
            <span>${formatTime(project.updated_at)}</span>
          </div>
        </button>
      `).join("");
      box.querySelectorAll(".project-card").forEach(node => {
        node.addEventListener("click", () => {
          selectedId = node.dataset.id;
          renderProjects();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const project = projects.find(p => p.id === selectedId);
      const detail = document.getElementById("detail");
      const currentStatus = document.getElementById("currentStatus");
      const artifacts = document.getElementById("artifactActions");
      if (!project) {
        detail.className = "empty";
        detail.innerHTML = "请选择左侧项目，或点击顶部“新建项目”。";
        currentStatus.className = "status";
        currentStatus.textContent = "未选择";
        artifacts.innerHTML = '<button class="secondary" disabled>请选择已完成项目</button>';
        return;
      }
      currentStatus.className = `status ${project.status}`;
      currentStatus.textContent = statusLabel(project.status);
      const summary = project.summary || {};
      detail.className = "";
      detail.innerHTML = `
        <div class="panel-head">
          <div>
            <h2>${escapeHtml(project.name)}</h2>
            <p class="muted">项目 ID：${project.id} · 更新：${formatTime(project.updated_at)}</p>
          </div>
          <div class="row">
            <span class="status ${project.status}">${statusLabel(project.status)}</span>
            <button type="button" class="danger" id="deleteBtn">删除项目</button>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-item"><span>项目状态</span><strong>${statusLabel(project.status)}</strong></div>
          <div class="summary-item"><span>分析内核</span><strong>${escapeHtml(summary.engine || "通用分析")}</strong></div>
        </div>

        <div class="divider"></div>

        <div class="metric-grid">
          <div class="metric"><span>上传文件</span><strong>${project.files?.length || 0}</strong><small>招标文件、方案文件及补充材料</small></div>
          <div class="metric"><span>废标风险</span><strong>${summary.risk_items?.length || 0}</strong><small>需优先人工复核</small></div>
          <div class="metric"><span>评分线索</span><strong>${summary.score_items?.length || 0}</strong><small>用于得分策略拆解</small></div>
          <div class="metric"><span>材料线索</span><strong>${summary.material_items?.length || 0}</strong><small>用于素材准备清单</small></div>
        </div>
      `;
      renderFileManagement(project);
      document.getElementById("deleteBtn").addEventListener("click", deleteSelectedProject);
      artifacts.innerHTML = project.status === "done"
        ? `<button class="button" id="viewReportBtn">查看完整报告</button><button class="button secondary" id="historyBtn">历史报告</button>`
        : '<button class="secondary" disabled>分析完成后可查看报告</button>';
      if (project.status === "done") {
        document.getElementById("viewReportBtn").addEventListener("click", () => openReportPreview(project.id));
        document.getElementById("historyBtn").addEventListener("click", () => openHistoryPanel(project.id));
      }
    }

    function renderFileManagement(project) {
      const detail = document.getElementById("detail");
      const fileCount = project.files?.length || 0;
      detail.insertAdjacentHTML("beforeend", `
        <div class="divider"></div>
        <section class="file-management">
          <div class="panel-head">
            <div>
              <h2>文件管理</h2>
              <p class="muted">上传或替换招标文件、方案文件，完成后重新开始分析。</p>
            </div>
          </div>
          <form id="uploadForm" class="file-toolbar">
            <div class="file-upload-zone${fileCount > 0 ? ' has-files' : ''}" id="uploadZone">
              <input id="files" name="files" type="file" multiple accept=".docx,.pdf,.txt,.md" class="file-input-hidden">
              ${fileCount > 0 ? `
                <div class="upload-icon">+</div>
                <div class="upload-title">继续上传文件</div>
                <div class="upload-hint">已上传 ${fileCount} 个文件，点击或拖拽添加更多</div>
              ` : `
                <div class="upload-icon">↑</div>
                <div class="upload-title">点击选择或拖拽文件到此处</div>
                <div class="upload-hint">支持招标文件（.docx / .pdf）和方案材料，可多选</div>
              `}
              <div class="upload-types">
                <span>.docx</span><span>.pdf</span><span>.txt</span><span>.md</span>
              </div>
            </div>
            <div class="upload-actions">
              <button type="submit" id="submitUploadBtn" ${!selectedId ? 'disabled' : ''}>上传文件</button>
              <button type="button" class="secondary" id="analyzeBtn" ${!selectedId ? 'disabled' : ''}>开始分析</button>
            </div>
          </form>
          <p class="message" id="detailMsg">${project.error ? "错误：" + escapeHtml(project.error) : ""}</p>
          <div class="divider"></div>
          <h2>已上传文件</h2>
          ${renderFileTable(project.files || [])}
        </section>
      `);
      const form = document.getElementById("uploadForm");
      const zone = document.getElementById("uploadZone");
      const filesInput = document.getElementById("files");

      // drag-and-drop
      ["dragenter","dragover"].forEach(evt => {
        zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); zone.classList.add("drag-over"); });
      });
      ["dragleave","drop"].forEach(evt => {
        zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); zone.classList.remove("drag-over"); });
      });
      zone.addEventListener("drop", e => {
        if (e.dataTransfer.files.length) {
          filesInput.files = e.dataTransfer.files;
          zone.classList.add("has-files");
          updateUploadZoneLabel(e.dataTransfer.files);
        }
      });

      function updateUploadZoneLabel(fileList) {
        const count = fileList?.length || filesInput.files?.length || 0;
        if (count > 0) {
          const names = Array.from(filesInput.files).map(f => f.name).join(", ");
          zone.querySelector(".upload-title").textContent = `已选择 ${count} 个文件`;
          zone.querySelector(".upload-hint").textContent = names;
          zone.classList.add("has-files");
        }
      }
      filesInput.addEventListener("change", () => updateUploadZoneLabel());

      form.addEventListener("submit", uploadFiles);
      document.getElementById("analyzeBtn").addEventListener("click", openAnalyzePanel);
    }

    function renderFileTable(files) {
      if (!files.length) return '<div class="empty" style="min-height:120px;padding:20px;border-radius:10px;">还没有上传文件。</div>';
      const iconSvgs = {
        docx: `<svg viewBox="0 0 32 32" fill="none"><path d="M8 3h12l6 6v20H8z" fill="#fff" stroke="#1a56c4" stroke-width="1.5"/><path d="M20 3v6h6" stroke="#1a56c4" stroke-width="1.5" fill="none"/><text x="16" y="22" text-anchor="middle" font-size="7" font-weight="700" fill="#1a56c4" font-family="sans-serif">DOCX</text></svg>`,
        pdf: `<svg viewBox="0 0 32 32" fill="none"><path d="M8 3h12l6 6v20H8z" fill="#fff" stroke="#c5221f" stroke-width="1.5"/><path d="M20 3v6h6" stroke="#c5221f" stroke-width="1.5" fill="none"/><text x="16" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#c5221f" font-family="sans-serif">PDF</text></svg>`,
        txt: `<svg viewBox="0 0 32 32" fill="none"><path d="M8 3h12l6 6v20H8z" fill="#fff" stroke="#137333" stroke-width="1.5"/><path d="M20 3v6h6" stroke="#137333" stroke-width="1.5" fill="none"/><text x="16" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#137333" font-family="sans-serif">TXT</text></svg>`,
        md: `<svg viewBox="0 0 32 32" fill="none"><path d="M8 3h12l6 6v20H8z" fill="#fff" stroke="#b06000" stroke-width="1.5"/><path d="M20 3v6h6" stroke="#b06000" stroke-width="1.5" fill="none"/><text x="16" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#b06000" font-family="sans-serif">MD</text></svg>`,
        default: `<svg viewBox="0 0 32 32" fill="none"><path d="M8 3h12l6 6v20H8z" fill="#fff" stroke="#5f6368" stroke-width="1.5"/><path d="M20 3v6h6" stroke="#5f6368" stroke-width="1.5" fill="none"/><circle cx="16" cy="19" r="3" fill="#5f6368"/></svg>`
      };
      return `<div class="file-list">${files.map(file => {
        const ext = file.filename.split(".").pop().toLowerCase() || "";
        const iconClass = `file-icon-${["docx","pdf","txt","md"].includes(ext) ? ext : "default"}`;
        const svg = iconSvgs[ext] || iconSvgs.default;
        const sizeKB = file.size > 1024 ? `${(file.size / 1024).toFixed(1)} KB` : `${file.size} B`;
        return `
        <article class="file-card">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="file-icon ${iconClass}">${svg}</div>
            <div style="min-width:0;flex:1;">
              <strong style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">${escapeHtml(file.filename)}</strong>
              <span>${sizeKB} · ${formatTime(file.uploaded_at)}</span>
            </div>
          </div>
          <span class="status done">已保存</span>
        </article>`;
      }).join("")}</div>`;
    }

    async function uploadFiles(event) {
      event.preventDefault();
      const input = document.getElementById("files");
      if (!selectedId || !input.files.length) {
        document.getElementById("detailMsg").textContent = "请选择要上传的文件。";
        return;
      }
      const form = new FormData();
      for (const file of input.files) form.append("files", file);
      document.getElementById("detailMsg").textContent = "正在上传...";
      const res = await safeFetch(api.files(selectedId), { method: "POST", body: form });
      if (!res.ok) {
        document.getElementById("detailMsg").textContent = "上传失败。";
        return;
      }
      document.getElementById("detailMsg").textContent = "上传完成。";
      await loadProjects(true);
    }

    function openAnalyzePanel() {
      if (!selectedId) return;
      const project = projects.find(p => p.id === selectedId);
      const fileCount = project?.files?.length || 0;
      if (fileCount === 0) {
        document.getElementById("detailMsg").textContent = "请先上传文件，再开始分析。";
        return;
      }
      const modal = document.getElementById("analyzeModal");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeAnalyzePanel() {
      const modal = document.getElementById("analyzeModal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      setMessage("analyzeMsg", "");
    }

    async function startAnalyze(type) {
      if (!selectedId) return;
      document.getElementById("analyzeMsg").textContent = "已提交分析任务...";
      const res = await safeFetch(`${api.analyze(selectedId)}?analyze_type=${type}`, { method: "POST" });
      if (!res.ok) {
        const err = await res.json();
        document.getElementById("analyzeMsg").textContent = err.detail || "分析启动失败。";
        return;
      }
      closeAnalyzePanel();
      document.getElementById("detailMsg").textContent = "已提交分析任务。";
      beginPolling();
      await loadProjects(true);
    }

    async function deleteSelectedProject() {
      const project = projects.find(p => p.id === selectedId);
      if (!project) return;
      const ok = window.confirm(`确认删除项目“${project.name}”？本地上传文件和报告也会删除。`);
      if (!ok) return;
      const res = await safeFetch(api.project(project.id), { method: "DELETE" });
      if (!res.ok) {
        document.getElementById("detailMsg").textContent = "删除失败。";
        return;
      }
      selectedId = null;
      await loadProjects(false);
    }

    function beginPolling() {
      if (polling) clearInterval(polling);
      polling = setInterval(async () => {
        await loadProjects(true);
        const project = projects.find(p => p.id === selectedId);
        if (!project || !["running", "draft"].includes(project.status)) {
          clearInterval(polling);
          polling = null;
        }
      }, 1800);
    }

    document.getElementById("createForm").addEventListener("submit", async event => {
      event.preventDefault();
      const form = new FormData();
      form.append("name", document.getElementById("projectName").value || "未命名标书分析项目");
      setMessage("createMsg", "正在创建...");
      const res = await safeFetch(api.projects, { method: "POST", body: form });
      const project = await res.json();
      selectedId = project.id;
      document.getElementById("projectName").value = "";
      setMessage("createMsg", "项目已创建。");
      closeCreatePanel();
      await loadProjects(true);
    });

    document.getElementById("createToggle").addEventListener("click", openCreatePanel);
    document.getElementById("sideCreateBtn").addEventListener("click", openCreatePanel);
    document.getElementById("createClose").addEventListener("click", closeCreatePanel);
    document.getElementById("createCancel").addEventListener("click", closeCreatePanel);
    document.getElementById("createModal").addEventListener("click", event => {
      if (event.target.id === "createModal") closeCreatePanel();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") { closeCreatePanel(); closeHistoryPanel(); }
    });
    document.getElementById("historyClose").addEventListener("click", closeHistoryPanel);
    document.getElementById("historyModal").addEventListener("click", event => {
      if (event.target.id === "historyModal") closeHistoryPanel();
    });
    function openReportPreview(projectId) {
      window.open(api.report(projectId), "_blank");
    }

    async function openHistoryPanel(projectId) {
      const modal = document.getElementById("historyModal");
      const list = document.getElementById("historyList");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      list.innerHTML = '<p class="muted">加载中...</p>';
      try {
        const res = await fetch(api.reports(projectId));
        const reports = await res.json();
        if (!reports.length) {
          list.innerHTML = '<p class="muted">暂无历史报告。</p>';
          return;
        }
        list.innerHTML = reports.map(r => {
          const typeLabel = r.analyze_type === "advanced" ? "高级分析" : "通用分析";
          const engineLabel = r.engine === "llm-moonshot" ? " · Kimi" : r.engine === "keyword-extract" ? " · 关键词" : r.engine ? ` · ${r.engine}` : "";
          const sizeKB = r.size > 1024 ? `${(r.size / 1024).toFixed(1)} KB` : `${r.size} B`;
          return `
          <div class="file-card" style="grid-template-columns:minmax(0,1fr) auto;align-items:center;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div class="file-icon file-icon-default">
                <svg viewBox="0 0 32 32" fill="none"><path d="M8 3h12l6 6v20H8z" fill="#fff" stroke="#5f6368" stroke-width="1.5"/><path d="M20 3v6h6" stroke="#5f6368" stroke-width="1.5" fill="none"/><text x="16" y="22" text-anchor="middle" font-size="7" font-weight="700" fill="#5f6368" font-family="sans-serif">HTML</text></svg>
              </div>
              <div style="min-width:0;flex:1;">
                <strong>${typeLabel}${engineLabel}</strong>
                <span>${formatTime(r.created_at)} · ${sizeKB}</span>
              </div>
            </div>
            <div style="display:flex;gap:8px;">
              <a class="button secondary" href="${api.reportById(projectId, r.id)}" target="_blank" style="min-height:34px;padding:0 12px;">查看</a>
              <a class="button secondary" href="${api.reportById(projectId, r.id)}" download="${r.filename}" style="min-height:34px;padding:0 12px;">下载</a>
            </div>
          </div>`;
        }).join("");
      } catch (err) {
        list.innerHTML = '<p class="muted">加载失败。</p>';
      }
    }

    function closeHistoryPanel() {
      const modal = document.getElementById("historyModal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    document.getElementById("refreshBtn").addEventListener("click", () => loadProjects(true));
    document.getElementById("btnGeneralAnalyze").addEventListener("click", () => startAnalyze("general"));
    document.getElementById("btnAdvancedAnalyze").addEventListener("click", () => startAnalyze("advanced"));

    // 退出登录
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await safeFetch("/api/logout", { method: "POST" });
      window.location.href = "/login";
    });

    // 启动时检查登录态
    (async () => {
      try {
        const res = await fetch("/api/me");
        if (!res.ok) { window.location.href = "/login"; return; }
        const data = await res.json();
        loadProjects(false);
      } catch {
        window.location.href = "/login";
      }
    })();
  </script>
</body>
</html>
