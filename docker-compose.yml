services:
  bidding-app:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: public.ecr.aws/docker/library/python:3.12-slim
    container_name: bidding-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/static:/app/backend/static:ro
    env_file:
      - .env
    restart: unless-stopped
    # 安全加固：降权 + 资源限制
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
